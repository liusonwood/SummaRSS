name: RSS AI Summary

on:
  schedule:
    - cron: '35 23 * * *' # 每天北京时间 07:35 运行 (UTC+8)
  workflow_dispatch: # 手动触发执行

# 关键：增加写入权限，否则脚本里的 git push 会报错
permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install trafilatura  # 在这里安装抓取全文所需的库

      - name: Run summarizer
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          RSS_SOURCE: ${{ secrets.RSS_SOURCE }}  # 支持多个RSS源，用英文逗号分隔
          AI_MODEL: ${{ secrets.AI_MODEL }}
          OPENROUTER_API_ENDPOINT: ${{ secrets.OPENROUTER_API_ENDPOINT }}
          GITHUB_ACTIONS: "true"
        run: |
          python3 -u summarize.py  # -u 启用无缓冲输出，实时显示日志